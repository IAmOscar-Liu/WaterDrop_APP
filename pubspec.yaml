name: flutter_ad_ecommerce
description: "A new Flutter project."
publish_to: "none"
version: 0.1.1+2026043002

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_sign_in: ^6.3.0
  firebase_auth: ^6.0.0
  go_router: ^16.0.0
  video_player: ^2.10.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  uuid: ^4.3.3
  flutter_native_splash: ^2.4.6
  intl: ^0.20.2
  dio: ^5.9.0
  event_bus: ^2.0.1
  flutter_masonry_view: ^0.0.2
  visibility_detector: ^0.4.0+2
  shared_preferences: ^2.5.3
  photo_view: ^0.15.0
  flutter_timezone: ^4.1.1
  url_launcher: ^6.3.2
  flutter_inappwebview: ^6.1.5
  firebase_core: ^4.2.0
  firebase_messaging: ^16.0.3
  flutter_local_notifications: ^19.0.0
  cached_network_image: ^3.4.1
  chewie: ^1.13.0
  image_picker: ^1.2.1
  device_info_plus: ^12.4.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.5.4
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.1.0

flutter_launcher_icons:
  image_path_android: "assets/icons/playstore.png"
  image_path_ios: "assets/icons/appstore.png"
  android: true
  ios: true
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/icons/playstore.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/icons/playstore.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/icons/appstore.png"

flutter:
  uses-material-design: true

  assets:
    - assets/videos/
    - assets/icons/
    - assets/images/
    - assets/json/

flutter_native_splash:
  # background_image: "assets/icons/splash_screen.png"
  color: "#ffffff"
  image: assets/icons/splash_screen.png
  web_image_mode: contain
  android_12:
    image: assets/icons/splash_screen.png
    color: "#ffffff"
